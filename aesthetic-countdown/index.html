<DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aesthetic Age & Countdown Pro</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,600&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body class="theme-indigo">

    <div class="control-bar">
        <button id="darkModeToggle">🌙 Dark Mode</button>
        <select id="themeSelect">
            <option value="indigo">Indigo</option>
            <option value="pink">Ruby Pink</option>
            <option value="gold">Cyber Gold</option>
        </select>
    </div>

    <div class="app-container">
        <div class="tabs">
            <button class="tab-btn active" data-tab="age-calc">✨ Aesthetic Age</button>
            <button class="tab-btn" data-tab="countdown-calc">⏳ Event Countdown</button>
        </div>

        <div id="age-calc" class="tab-content active">
            <h2 class="title">Aesthetic Age Calculator</h2>
            <p class="subtitle">Discover your true age based on your style & vibe</p>

            <div class="form-grid">
                <div class="input-field">
                    <label>Your Real Age</label>
                    <input type="number" id="realAge" placeholder="Enter age">
                </div>
                <div class="input-field">
                    <label>Select Your Vibe / Aesthetic</label>
                    <select id="vibeStyle">
                        <option value="minimalist">Minimalist / Aesthetic Clean</option>
                        <option value="retro">Retro / Vintage (90s Lover)</option>
                        <option value="cyber">Y2K / Cyberpunk</option>
                        <option value="indie">Indie / Grunge Kid</option>
                    </select>
                </div>
            </div>

            <button id="btnCalculate" class="primary-btn">Calculate My Aesthetic Age</button>

            <div id="ageResult" class="result-box hidden">
                <p>Your Aesthetic Age is</p>
                <h1 id="txtAestheticAge">21</h1>
                <p id="txtVibeDesc" class="vibe-text"></p>
            </div>
        </div>

        <div id="countdown-calc" class="tab-content">
            <h2 class="title">Premium Countdown <span class="badge-pro">PRO</span></h2>
            <p class="subtitle">Track your special moments with your favorite background photo</p>

            <div class="form-grid">
                <div class="input-field">
                    <label>Event Name</label>
                    <input type="text" id="eventTitle" placeholder="e.g., My Birthday">
                </div>
                <div class="input-field">
                    <label>Target Date & Time</label>
                    <input type="datetime-local" id="eventDate">
                </div>
            </div>

            <div class="input-field full-width">
                <label>✨ Upload Background Photo (Optional)</label>
                <input type="file" id="imageUpload" accept="image/*">
            </div>

            <button id="btnStartCountdown" class="primary-btn">Start Countdown</button>

            <div id="countdownCard" class="live-card hidden">
                <div class="card-blur-overlay"></div>
                <div class="card-inner-body">
                    <h3 id="lblEventHeading" class="card-heading"></h3>
                    <div class="display-timer-grid">
                        <div class="time-segment">
                            <span id="boxDays">00</span>
                            <label>Days</label>
                        </div>
                        <div class="time-segment">
                            <span id="boxHours">00</span>
                            <label>Hours</label>
                        </div>
                        <div class="time-segment">
                            <span id="boxMins">00</span>
                            <label>Mins</label>
                        </div>
                        <div class="time-segment">
                            <span id="boxSecs">00</span>
                            <label>Secs</label>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
