<DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aesthetic App</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="top-controls">
        <button id="themeToggle" class="control-btn">🌙 Dark Mode</button>
        <select id="colorPalette" class="control-select">
            <option value="indigo">Indigo</option>
            <option value="rose">Rose Gold</option>
            <option value="sage">Sage Green</option>
            <option value="cyber">Cyber Neon</option>
        </select>
    </div>

    <div class="main-container">
        <div class="tab-switchers">
            <button class="tab-btn active" data-tab="ageTab">✨ Aesthetic Age</button>
            <button class="tab-btn" data-tab="countdownTab">⏳ Event Countdown</button>
        </div>

        <div id="ageTab" class="tab-content active">
            <div class="tool-header">
                <h2>Aesthetic Age Calculator</h2>
                <p class="subtitle">Discover your true age based on your style & vibe</p>
            </div>

            <div class="input-grid">
                <div class="input-group">
                    <label>Your Real Age</label>
                    <input type="number" id="realAge" placeholder="e.g., 22">
                </div>
                <div class="input-group">
                    <label>Select Your Vibe / Aesthetic</label>
                    <select id="vibeSelect">
                        <option value="minimalist">Minimalist / Aesthetic Clean</option>
                        <option value="vintage">Retro / Vintage Vinyl</option>
                        <option value="y2k">Y2K / Cyberpunk</option>
                        <option value="indie">Indie / Grunge Kid</option>
                    </select>
                </div>
            </div>

            <button id="calculateAgeBtn" class="action-btn">Calculate My Aesthetic Age</button>

            <div id="ageResultBox" class="result-display hidden">
                <p>Your Aesthetic Age is</p>
                <h1 id="calculatedAgeDisplay">21</h1>
                <p id="vibeDescription" class="vibe-desc"></p>
            </div>
        </div>

        <div id="countdownTab" class="tab-content">
            <div class="tool-header">
                <h2>Premium Countdown <span class="pro-badge">PRO</span></h2>
                <p class="subtitle">Track your special moments with your favorite background photo</p>
            </div>

            <div class="input-grid">
                <div class="input-group">
                    <label>Event Name</label>
                    <input type="text" id="eventName" placeholder="e.g., My Birthday, New Year">
                </div>
                <div class="input-group">
                    <label>Target Date & Time</label>
                    <input type="datetime-local" id="targetDateTime">
                </div>
            </div>

            <div class="input-group pro-upload-group">
                <label>✨ Upload Background Photo (Optional)</label>
                <input type="file" id="bgImageInput" accept="image/*">
            </div>

            <button id="startCountdownBtn" class="action-btn">Start Countdown</button>

            <div id="countdownWidgetCard" class="widget-card hidden">
                <div class="widget-overlay"></div>
                <div class="widget-content">
                    <h3 id="eventTitleDisplay" class="event-title"></h3>

                    <div id="countdownDisplayBox" class="countdown-grid">
                        <div class="timer-block">
                            <span id="daysBox">00</span>
                            <label>Days</label>
                        </div>
                        <div class="timer-block">
                            <span id="hoursBox">00</span>
                            <label>Hours</label>
                        </div>
                        <div class="timer-block">
                            <span id="minsBox">00</span>
                            <label>Mins</label>
                        </div>
                        <div class="timer-block">
                            <span id="secsBox">00</span>
                            <label>Secs</label>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
