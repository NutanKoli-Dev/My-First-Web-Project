<div class="converter-card">
    <h2>Smart Converter</h2>
    
    <-- Tabs to switch between Unit and Currency -->
    <div class="tab-container">
        <div class="tab active" id="unitTab" onclick="switchTab('unit')">Unit (Length)</div>
        <div class="tab" id="currencyTab" onclick="switchTab('currency')">Currency (USD/INR)</div>
    </div>

    <-- Input Value -->
    <div class="input-group">
        <label>Enter Value</label>
        <input type="number" id="inputValue" value="1" oninput="performConversion()">
    </div>

    <-- Dynamic Select Options based on Tab -->
    <div class="input-group">
        <label>From</label>
        <select id="fromType" onchange="performConversion()"></select>
    </div>

    <div class="input-group">
        <label>To</label>
        <select id="toType" onchange="performConversion()"></select>
    </div>

    <-- Output Result -->
    <div class="result-box">
        <p>Converted Result</p>
        <h3 id="resultDisplay">0.00</h3>
    </div>
    
    <div class="footer-credit">Clean & Responsive Web Utility Template</div>
    </div>
